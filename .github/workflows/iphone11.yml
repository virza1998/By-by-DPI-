name: Generate Proxy Configs

on:
  schedule:
    - cron: '0 */4 * * *' # Робот будет сам обновлять ключи каждые 4 часа!
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Collect Advanced Anti-Block Keys
        run: |
          mkdir -p public
          echo "<html><head><title>My Configs</title></head><body>" > public/index.html
          echo "<h1>My iPhone Subscription (Anti-Block 2026)</h1>" >> public/index.html
          echo "<p>Last updated: $(date)</p>" >> public/index.html
          echo "<pre>" >> public/index.html
          
          # Скачиваем ТОП-150 самых быстрых и свежих ключей для телефонов (VLESS + Shadowsocks)
          curl -sL "https://githubusercontent.com" >> public/index.html || true
          
          # Добавляем резервную CIDR-подписку для обхода блокировок мобильного интернета
          curl -sL "https://githubusercontent.com" >> public/index.html || true
          
          echo "</pre></body></html>" >> public/index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

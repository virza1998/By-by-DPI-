name: Generate Proxy Configs

on:
  schedule:
    - cron: '0 */4 * * *' # Робот будет проверять сервера чаще — каждые 4 часа!
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Collect Advanced Anti-Block Keys
        run: |
          mkdir -p public
          echo "<html><head><title>My Configs</title></head><body>" > public/index.html
          echo "<h1>My iPhone Subscription (Anti-Block)</h1>" >> public/index.html
          echo "<p>Last updated: $(date)</p>" >> public/index.html
          echo "<pre>" >> public/index.html
          
          echo "=== ANTI-BLOCK VLESS REALITY KEYS ===" >> public/index.html
          
          # Источник 1: Новейшие ключи VLESS Reality с обходом ТСПУ глушилок (2026)
          curl -sL "https://githubusercontent.com" >> public/index.html || true
          
          # Источник 2: Высокоскоростные VLESS / Trojan сервера, обновляемые каждые 10 минут
          curl -sL "https://githubusercontent.com" >> public/index.html || true
          
          # Источник 3: Запасной проверенный пул для обхода блокировок YouTube
          curl -sL "https://raw.githubusercontent.com/kort0881/vpn-vless-configs-russia/main/githubmirror/clean/vless.txt" >> public/index.html || true
          
          echo "</pre></body></html>" >> public/index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


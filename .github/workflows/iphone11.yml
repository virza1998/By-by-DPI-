name: Generate Proxy Configs

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Collect Fresh Live Keys
        run: |
          mkdir -p public
          echo "<html><head><title>My Configs</title></head><body>" > public/index.html
          echo "<h1>My iPhone Subscription (Live Only)</h1>" >> public/index.html
          echo "<p>Last updated: $(date)</p>" >> public/index.html
          echo "<pre>" >> public/index.html
          
          echo "=== LIVE ANTI-BLOCK VLESS REALITY KEYS ===" >> public/index.html
          
          # Источник 1: Огромная база рабочих VLESS, VMess и Trojan ключей (Обновляется каждые несколько часов)
          curl -sL "https://githubusercontent.com" >> public/index.html || true
          
          # Источник 2: Проверенный азиатский и европейский пул скоростных VLESS Reality серверов
          curl -sL "https://githubusercontent.com" >> public/index.html || true
          
          # Источник 3: Популярный и очень стабильный агрегатор незаблокированных конфигураций
          curl -sL "https://githubusercontent.com" >> public/index.html || true
          
          echo "</pre></body></html>" >> public/index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Generate Proxy Configs

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Создаем сайт и скачиваем ключи (если сайт недоступен, робот не упадет)
      - name: Collect Shadowsocks
        run: |
          mkdir -p public
          echo "<html><head><title>My Configs</title></head><body>" > public/index.html
          echo "<h1>My iPhone Subscription</h1>" >> public/index.html
          echo "<pre>" >> public/index.html
          echo "=== SHADOWSOCKS KEYS ===" >> public/index.html
          
          # Пытаемся скачать ключи. Если сайт лежит, команда || true не даст роботу упасть с ошибкой 6
          curl -sL "https://githubusercontent.com" >> public/index.html || true
          
          # Сюда вы можете вписать любой ваш личный ключ (он будет работать всегда!)
          echo "ss://Y2hhY2hhMjAtaWV0Zi1wb2x5MTMwNjp0ZXN0@127.0.0.1:8585#MyPermanentKey" >> public/index.html
          
          echo "</pre></body></html>" >> public/index.html

      # Шаг 2: Публикуем созданную страницу в ветку сайта
      - name: Deploy to gh-pages branch
        run: |
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update configs"
          git push --force "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}.git" HEAD:gh-pages

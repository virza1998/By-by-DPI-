name: Generate Proxy Configs

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

# Принудительно включаем поддержку Node 24 для всех шагов
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Скачиваем код репозитория с принудительным флагом Node24
      - name: Checkout code
        uses: actions/checkout@v4

      # Скачиваем ключи и создаем простую HTML страницу
      - name: Collect Shadowsocks
        run: |
          mkdir -p public
          echo "<html><head><title>My Configs</title></head><body>" > public/index.html
          echo "<h1>My iPhone Subscription</h1>" >> public/index.html
          echo "<pre>" >> public/index.html
          echo "=== SHADOWSOCKS KEYS ===" >> public/index.html
          curl -sL "https://githubusercontent.com" >> public/index.html
          echo "</pre></body></html>" >> public/index.html

      # Публикуем напрямую в ветку gh-pages без использования сложных экшенов
      - name: Deploy to gh-pages branch
        run: |
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git add .
          git commit -m "Update configs"
          git push --force "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}.git" HEAD:gh-pages

name: Generate Proxy Configs

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

# Принудительно даем роботу права на создание веб-страницы
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Шаг 1: Создаем папку и генерируем страницу с ключами
      - name: Collect Shadowsocks
        run: |
          mkdir -p public
          echo "<html><head><title>My Configs</title></head><body>" > public/index.html
          echo "<h1>My iPhone Subscription</h1>" >> public/index.html
          echo "<pre>" >> public/index.html
          echo "=== SHADOWSOCKS KEYS ===" >> public/index.html
          
          # Скачиваем ключи из интернета. Если ссылка недоступна, робот не упадет
          curl -sL "https://githubusercontent.com" >> public/index.html || true
          
          # Ваш постоянный запасной ключ
          echo "ss://Y2hhY2hhMjAtaWV0Zi1wb2x5MTMwNjp0ZXN0@127.0.0.1:8585#MyPermanentKey" >> public/index.html
          
          echo "</pre></body></html>" >> public/index.html

      # Шаг 2: Упаковываем сайт для отправки
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      # Шаг 3: Официальная публикация на серверах GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

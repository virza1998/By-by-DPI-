name: Generate Proxy Configs

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Collect Shadowsocks
        run: |
          mkdir -p public
          echo "# My iPhone Subscription" > public/index.html
          echo "<pre>" >> public/index.html
          echo "=== SHADOWSOCKS KEYS ===" >> public/index.html
          curl -s https://githubusercontent.com >> public/index.html
          echo "</pre>" >> public/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

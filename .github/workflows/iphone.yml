name: Generate Proxy Configs

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Collect Fresh Proxy Keys
        run: |
          mkdir -p public
          echo "<html><head><title>My Configs</title></head><body>" > public/index.html
          echo "<h1>My iPhone Subscription</h1>" >> public/index.html
          echo "<p>Last updated: $(date)</p>" >> public/index.html
          echo "<pre>" >> public/index.html
          
          echo "=== LIVE SHADOWSOCKS & VLESS KEYS ===" >> public/index.html
          
          # Источник 1: Свежие российские и общие VLESS/Shadowsocks базы (2026)
          curl -sL "https://raw.githubusercontent.com/kort0881/vpn-vless-configs-russia/main/githubmirror/clean/vless.txt" >> public/index.html || true
          
          # Источник 2: Проверенные раздробленные по протоколам v2ray ключи
          curl -sL "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Splitted-By-Protocol/vmess.txt" >> public/index.html || true
          
          # Источник 3: Популярный агрегатор прокси-ключей
          curl -sL "https://raw.githubusercontent.com/YasserDivaR/pr0xy/main/ShadowSocks2021.txt" >> public/index.html || true
          
          # Наш неубиваемый постоянный ключ
          echo "ss://Y2hhY2hhMjAtaWV0Zi1wb2x5MTMwNjp0ZXN0@127.0.0.1:8585#MyPermanentKey" >> public/index.html
          
          echo "</pre></body></html>" >> public/index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

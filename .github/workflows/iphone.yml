name: Generate Proxy Configs

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

# Добавляем глобальное разрешение для старых модулей
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Collect Shadowsocks
        run: |
          mkdir -p public
          echo "# My iPhone Subscription" > public/index.html
          echo "<pre>" >> public/index.html
          echo "=== SHADOWSOCKS KEYS ===" >> public/index.html
          curl -s https://githubusercontent.com >> public/index.html
          echo "</pre>" >> public/index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
